<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1-5-2 Oracle</title>
<script src="https://js.puter.com/v2/"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&display=swap');
  
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body { 
    background: #0a0614; 
    min-height: 100vh; 
    font-family: 'Crimson Pro', serif; 
    color: #e8dfc8; 
    overflow-x: hidden; 
  }

  .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; background: radial-gradient(ellipse at 20% 20%, #1a0a2e 0%, #0a0614 60%); }
  .star { position: absolute; background: white; border-radius: 50%; animation: twinkle 3s infinite alternate; }
  @keyframes twinkle { 0% { opacity: 0.2; } 100% { opacity: 1; } }

  .container { position: relative; z-index: 1; max-width: 1000px; margin: 0 auto; padding: 20px 10px 60px; text-align: center; }
  
  .btn-group { display: flex; flex-direction: column; align-items: center; gap: 12px; margin-bottom: 40px; }
  
  .draw-btn { font-family: 'Cinzel', serif; font-size: 14px; letter-spacing: 3px; text-transform: uppercase; color: #0a0614; background: linear-gradient(135deg, #f0c040, #e0a020); border: none; padding: 16px 44px; border-radius: 50px; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 20px rgba(240,192,64,0.3); }
  .draw-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(240,192,64,0.5); }
  .draw-btn:active { transform: scale(0.98); }
  
  .daily-btn { font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: #9d8fc0; background: transparent; border: 1px solid rgba(157,143,192,0.4); padding: 10px 28px; border-radius: 50px; cursor: pointer; transition: all 0.3s; }

  .title { font-family: 'Cinzel', serif; font-size: clamp(22px, 4vw, 38px); font-weight: 700; color: #f0c040; letter-spacing: 4px; text-shadow: 0 0 30px rgba(240,192,64,0.5); margin-bottom: 6px; }
  .subtitle { font-family: 'Crimson Pro', serif; font-style: italic; font-size: 16px; color: #9d8fc0; margin-bottom: 30px; letter-spacing: 2px; }

  .spread-labels { display: flex; justify-content: center; gap: 20px; margin-bottom: 12px; }
  .spread-label { flex: 1; max-width: 180px; font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 3px; color: #9d8fc0; text-transform: uppercase; }

  /* Fixed squeezing issue - ensures slots are equal and center card has space */
  .cards-area { display: flex; justify-content: center; gap: 20px; margin-bottom: 36px; align-items: flex-start; }
  .card-slot { flex: 1; max-width: 180px; min-width: 100px; display: flex; flex-direction: column; align-items: center; gap: 16px; }
  .card { width: 100%; aspect-ratio: 180/280; position: relative; cursor: pointer; perspective: 1000px; }
  .card-inner { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
  .card.flipped .card-inner { transform: rotateY(180deg); }
  
  .card-back, .card-front { position: absolute; width: 100%; height: 100%; border-radius: 16px; backface-visibility: hidden; border: 1px solid rgba(240,192,64,0.3); overflow: hidden; }
  .card-back { background: linear-gradient(135deg, #1a0a2e 0%, #0d1a3e 50%, #1a0a2e 100%); display: flex; align-items: center; justify-content: center; }
  .card-back-symbol { font-size: 42px; opacity: 0.6; filter: drop-shadow(0 0 10px rgba(240,192,64,0.4)); }

  .card-front { transform: rotateY(180deg); background: #0f0820; display: flex; flex-direction: column; }
  
  .daily-mode .card-front { background: #e8dfc8; color: #0a0614; border: 2px solid #f0c040; }
  .daily-mode .card-name { color: #0a0614 !important; border-top: 1px solid rgba(0,0,0,0.1) !important; }
  .daily-mode .card-type-banner { border-bottom: 1px solid rgba(0,0,0,0.1) !important; color: #0a0614 !important; }
  .daily-mode .card-keyword { color: #0a0614 !important; }

  .card-type-banner { padding: 8px 5px 6px; text-align: center; font-family: 'Cinzel', serif; font-size: 8px; letter-spacing: 2px; text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,0.1); }
  .card-art-area { flex: 1; display: flex; align-items: center; justify-content: center; padding: 10px; }
  .card-art-img { width: 80%; height: auto; filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5)); image-rendering: pixelated; }
  .card-name { font-family: 'Cinzel', serif; font-size: 12px; font-weight: 600; text-align: center; padding: 8px 5px; border-top: 1px solid rgba(255,255,255,0.1); letter-spacing: 1px; }
  .card-keyword { font-family: 'Cinzel', serif; font-size: 8px; letter-spacing: 2px; text-align: center; padding: 4px 5px 8px; text-transform: uppercase; color: #f0c040; }

  .card-reading { width: 100%; min-height: 80px; background: rgba(255,255,255,0.03); border: 1px solid rgba(240,192,64,0.15); border-radius: 12px; padding: 12px; opacity: 0; transition: opacity 0.6s ease 0.6s; text-align: left; }
  .card-reading.visible { opacity: 1; }
  .reading-position { font-family: 'Cinzel', serif; font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: #9d8fc0; margin-bottom: 6px; }
  .reading-text { font-family: 'Crimson Pro', serif; font-style: italic; font-size: 13px; line-height: 1.5; color: #c8bfa0; }

  .oracle-message { margin-top: 20px; padding: 24px 32px; background: rgba(240,192,64,0.05); border: 1px solid rgba(240,192,64,0.2); border-radius: 16px; max-width: 700px; margin-left: auto; margin-right: auto; opacity: 0; transition: opacity 1s; }
  .oracle-message.visible { opacity: 1; }
  .oracle-title { font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: #f0c040; margin-bottom: 12px; }
  .oracle-text { font-family: 'Crimson Pro', serif; font-style: italic; font-size: 17px; line-height: 1.8; color: #d8ccb0; }

  .follow-up-section { margin-top: 30px; opacity: 0; transition: opacity 0.5s; display: none; }
  .follow-up-section.visible { opacity: 1; display: block; }
  
  @media (max-width: 600px) {
    .spread-labels { gap: 10px; }
    .spread-label { font-size: 9px; }
    .cards-area { gap: 10px; }
    .card-reading { padding: 8px; }
    .reading-text { font-size: 11px; }
  }
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="container">
  
  <div class="btn-group">

  </div>

  <div class="cards-area" id="cardsArea">

    <div class="card-slot" id="slot1"><div class="card" id="card1"><div class="card-inner"><div class="card-back"><div class="card-back-symbol">☀</div></div><div class="card-front" id="front1"></div></div></div><div class="card-reading" id="reading1"><div class="reading-position" id="posText1">☀ Present</div><div class="reading-text" id="readingText1"></div></div></div>
    <div class="card-slot" id="slot2"><div class="card" id="card2"><div class="card-inner"><div class="card-back"><div class="card-back-symbol">★</div></div><div class="card-front" id="front2"></div></div></div><div class="card-reading" id="reading2"><div class="reading-position">★ Future</div><div class="reading-text" id="readingText2"></div></div></div>
  </div>

  <div class="oracle-message" id="oracleMsg">
    <div class="oracle-title">✦ The Oracle Speaks ✦</div>
    <div class="oracle-text" id="oracleMsgText"></div>
  </div>

  <div class="follow-up-section" id="followUpSection">
      <input type="text" id="userInput" placeholder="Whisper a follow-up to the Oracle..." 
             style="width: 80%; max-width: 400px; padding: 12px 20px; border-radius: 25px; border: 1px solid rgba(240,192,64,0.4); background: rgba(15,8,32,0.8); color: #e8dfc8; font-family: 'Crimson Pro', serif; outline: none; margin-bottom: 15px;">
      <br>
      <button onclick="askFollowUp()" class="daily-btn">Consult Further</button>
      <div id="followUpResponse" class="oracle-text" style="margin-top:20px; font-size: 16px; max-width: 600px; margin-left: auto; margin-right: auto;"></div>
  </div>
</div>

  {id:2,name:"Ivysaur",type:"grass",keyword:"The Budding",readings:{past:"A long season of preparation has ended. You outgrew the small pot you were kept in.",present:"The pressure you feel is simply the blossom trying to break through. Do not fear the strain.",future:"You are moving toward a period of vibrant color and recognition. Your efforts are finally visible.",daily:"Preparation is almost complete. Trust that you have gathered enough nutrients to finally bloom today."}},
  {id:3,name:"Venusaur",type:"grass",keyword:"Earth Abundance",readings:{past:"You weathered seasons of drought and storm. You are a master of silent growth and survival.",present:"Standing in the power of your harvest. Recognize the richness currently surrounding your daily life.",future:"Share your abundance. Your personal garden grows larger the more wisdom you give away to others.",daily:"Abundance is a mindset today. Look at how much you have already built through your long effort."}},
  {id:4,name:"Charmander",type:"fire",keyword:"The Inner Flame",readings:{past:"A small spark was ignited in your past. It has been smoldering, waiting for fresh air.",present:"Keep your passion burning but contained. Do not let your intensity consume what you love.",future:"Your inner light will eventually grow into a beacon that guides others through their own darkness.",daily:"Enthusiasm is your compass. Let your natural excitement lead you toward a new creative spark today."}},
  {id:5,name:"Charmeleon",type:"fire",keyword:"Fierce Friction",readings:{past:"Your past was defined by a necessary struggle. That friction sharpened your spirit and your resolve.",present:"You are in a volatile stage of transformation. The heat is uncomfortable because it is changing you.",future:"You will soon emerge from this fire as a sovereign force, answerable only to your own heart.",daily:"Frustration is just energy without a home. Channel your 'burn' into a difficult task today."}},
  {id:6,name:"Charizard",type:"fire",keyword:"Fierce Sovereignty",readings:{past:"You burned through old expectations. That fire cleared the way for your current magnificent flight.",present:"Spread your wings and take up space. You do not need anyone's permission to own your sky.",future:"You will soon reach a position of true authority where your fire protects rather than burns.",daily:"Confidence is your best asset today. Stand tall and let your presence be felt without any apology."}},
  {id:7,name:"Squirtle",type:"water",keyword:"The Protected Heart",readings:{past:"You learned to carry your home and defenses within you. That shell kept you safe through trials.",present:"Emotions are flowing like tides. Do not resist the current; simply find your balance and float.",future:"Gentleness will be your strongest armor. Softness will eventually ensure your total victory over hard situations.",daily:"It is okay to retreat into your shell for a moment. Emotional protection is necessary maintenance."}},

  {id:9,name:"Blastoise",type:"water",keyword:"Focused Force",readings:{past:"You held a tremendous amount of internal pressure for a long time. It was a heavy weight.",present:"Aim your intentions with precision. Do not scatter energy today; strike at the very core.",future:"You will become the steady current that carries an entire community forward through rocky waters.",daily:"Power without focus is just noise. Channel your energy into one single, meaningful task today."}},

  {id:11,name:"Metapod",type:"bug",keyword:"Sacred Stillness",readings:{past:"You hit a wall where movement stopped. That stillness was actually a period of deep internal reconstruction.",present:"The cocoon is tight for a reason. You are undergoing a total shift of soul and mind.",future:"You will emerge with a completely different perspective. The waiting is the most vital part of work.",daily:"Be still today. Resilience isn't always about fighting; sometimes it is about simply holding your form."}},

  {id:16,name:"Pidgey",type:"flying",keyword:"Daily Grace",readings:{past:"You made the most of simple skies. Your past was about mastering the basic rhythms of life.",present:"Do not ignore the ordinary. There is profound wisdom in your standard daily routine today.",future:"Consistency will take you further than a single burst of energy ever could. Keep showing up.",daily:"Fly low and observe. You don't need a grand plan to have a successful day today."}},
  {id:17,name:"Pidgeotto",type:"flying",keyword:"Claimed Space",readings:{past:"You fought for your territory and won. Your past was a series of successful small defenses.",present:"Guard your energy as fiercely as you guard your home. Not every visitor deserves your time.",future:"Your range is expanding. You will soon be comfortable in environments that once felt intimidating.",daily:"Draw a circle around what matters. Today is for protecting your peace from unnecessary outside noise."}},
  {id:18,name:"Pidgeot",type:"flying",keyword:"Majestic Vision",readings:{past:"You outran your predators and your fears. Your past was defined by a swift, necessary escape.",present:"Rise above the cloud line. Perspective is your greatest tool for solving this current puzzle.",future:"You will be recognized as a leader in your field. Your vision is clearer than the rest.",daily:"Look at the big picture. Don't get caught in the weeds of a minor disagreement today."}},
  {id:19,name:"Rattata",type:"normal",keyword:"Quick Wit",readings:{past:"You survived on very little. Your past taught you how to find a way out of any corner.",present:"Be resourceful today. The tool you need is already in your possession, just used differently.",future:"You will thrive in a high-pressure environment because you are faster and sharper than the competition.",daily:"Trust your instincts. If a situation feels like a trap, move quickly in the other direction."}},
  {id:20,name:"Raticate",type:"normal",keyword:"Relentless Grit",readings:{past:"You were underestimated for a long time. You grew thick skin and a sharper bite to survive.",present:"Don't back down from the obstacle. Keep gnawing at it until the wall finally gives way.",future:"Your sheer tenacity will become legendary. You are the one who never knows when to quit.",daily:"Persistence is the only thing that matters today. Put your head down and finish the job."}},

  {id:25,name:"Pikachu",type:"electric",keyword:"Pure Joy",readings:{past:"A moment of pure, childlike electricity defined your path. Remember that spark of pure, unadulterated excitement.",present:"Radiate your energy outward without fear. Your vibration is meant to light up the room.",future:"You will soon act as a bridge between two worlds, connecting people through your unique spirit.",daily:"Shock the system with a bit of fun. Your positive energy is contagious to those around you."}},
  {id:26,name:"Raichu",type:"electric",keyword:"Amplified Aura",readings:{past:"You kept your power grounded for a long time, building up a charge hidden from the world.",present:"The time for subtlety has passed. Release the full energy of your personality and glow.",future:"You will light the way for a group. Your energy is the spark needed to start a movement.",daily:"Don't hold back your true opinions today. You have more power than you are currently using."}},
  {id:27,name:"Sandshrew",type:"ground",keyword:"Solid Ground",readings:{past:"You retreated when things got too hot. Your past was about finding safety in the earth.",present:"Stay grounded today. The chaos around you cannot move you if your roots are deep.",future:"You will build something that lasts. Your future is made of stone and brick, not sand.",daily:"Find your center. Spend some time in nature or just sit quietly to recalibrate your spirit."}},
  {id:28,name:"Sandslash",type:"ground",keyword:"The Thorned Guard",readings:{past:"You were hurt before, so you grew spines. Your past was a masterclass in self-defense.",present:"It is safe to lower your guard slightly. Not everyone is looking for a fight today.",future:"Your protection will become a sanctuary for others. You are becoming a safe harbor for many.",daily:"Distinguish between a real threat and a perceived one. Don't let your spines hurt your friends."}},
  {id:29,name:"Nidoranâ™€",type:"poison",keyword:"Quiet Strength",readings:{past:"You were the observer in your family. Your past was about understanding the dynamics of power.",present:"Your softest word carries the most weight today. Lead through gentle influence rather than loud force.",future:"You will create a legacy of nurturing power. Your influence will be felt for a long time.",daily:"Listen more than you speak. The information you gather today will be a weapon tomorrow."}},

const positions = ["past","present","future"];
let drawn = [];
let currentDrawnPokeNames = "";

function createStars() {
  const container = document.getElementById('stars');
  for(let i=0; i<100; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    const size = Math.random()*2+0.5;
    star.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${Math.random()*3}s;`;
    container.appendChild(star);
  }
}

function clearSpread() {
    drawn = [];
    document.getElementById('cardsArea').classList.remove('daily-mode');
    document.getElementById('labels').style.opacity = '1';
    document.getElementById('slot0').style.display = 'flex';
    document.getElementById('slot1').style.display = 'flex';
    document.getElementById('slot2').style.display = 'flex';
    document.getElementById('posText1').textContent = "☀ Present";
    document.getElementById('oracleMsg').classList.remove('visible');
    document.getElementById('followUpSection').classList.remove('visible');
    document.getElementById('followUpResponse').textContent = "";
    document.getElementById('userInput').value = "";
    [0,1,2].forEach(i => {
        document.getElementById('card'+i).classList.remove('flipped');
        document.getElementById('reading'+i).classList.remove('visible');
        document.getElementById('front'+i).innerHTML = '';
    });
}

function buildCardFront(poke) {
  const spriteUrl = poke.id === 0 ? "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/fossil-box.png" : `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${poke.id}.png`;
  return `
    <div class="card-type-banner">✦ ${poke.type.toUpperCase()} ✦</div>
    <div class="card-art-area"><img src="${spriteUrl}" class="card-art-img" alt="${poke.name}" onerror="this.src='https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/fossil-box.png'"></div>
    <div class="card-name">${poke.name}</div>
    <div class="card-keyword">✦ ${poke.keyword} ✦</div>
  `;
}

function shuffle(array) {
  let currentIndex = array.length, randomIndex;
  while (currentIndex != 0) {
    randomIndex = Math.floor(Math.random() * currentIndex);
    currentIndex--;
    [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
  }
  return array;
}

async function drawCards() {
  clearSpread();
  const shuffled = shuffle([...pokemon]);
  drawn = shuffled.slice(0,3);
  currentDrawnPokeNames = `${drawn[0].name}, ${drawn[1].name}, and ${drawn[2].name}`;

  drawn.forEach((poke, i) => {
    document.getElementById('front'+i).innerHTML = buildCardFront(poke);
    setTimeout(() => {
      document.getElementById('card'+i).classList.add('flipped');
      document.getElementById('readingText'+i).textContent = poke.readings[positions[i]];
      document.getElementById('reading'+i).classList.add('visible');
    }, (i + 1) * 400);
  });

  setTimeout(async () => {
    document.getElementById('oracleMsgText').textContent = "Consulting the psychic and ghost types...";
    document.getElementById('oracleMsg').classList.add('visible');
    try {
      // Prompt tightened to be strictly Tarot guidance, no storytelling.
      const prompt = `Speak as a direct, whimsical Tarot Oracle. You just pulled these cards: ${drawn[0].name} (Past), ${drawn[1].name} (Present), and ${drawn[2].name} (Future). In exactly 3 short sentences, provide a cohesive whimsical guidance for the seeker. Do not describe scenery, decks, or spreads. Speak only of the lessons and energy. No dashes or parentheses.`;
      const response = await puter.ai.chat(prompt);
      document.getElementById('oracleMsgText').textContent = response.toString().replace(/—|–/g, '-');
      document.getElementById('followUpSection').classList.add('visible');
    } catch (err) {
      document.getElementById('oracleMsgText').textContent = "ABRA used TELEPORT! The spirits vanished. Try again.";
    }
  }, 1600);
}

function drawDaily() {
  clearSpread();
  document.getElementById('cardsArea').classList.add('daily-mode');
  const dailyPoke = pokemon[Math.floor(Math.random()*pokemon.length)];
  currentDrawnPokeNames = dailyPoke.name;

  document.getElementById('front1').innerHTML = buildCardFront(dailyPoke);
  document.getElementById('labels').style.opacity = '0';
  document.getElementById('slot0').style.display = 'none';
  document.getElementById('slot2').style.display = 'none';
  document.getElementById('posText1').textContent = "☀ Daily Insight";
  
  setTimeout(() => {
    document.getElementById('card1').classList.add('flipped');
    document.getElementById('readingText1').textContent = dailyPoke.readings.daily;
    document.getElementById('reading1').classList.add('visible');
    document.getElementById('oracleMsg').classList.add('visible');
    document.getElementById('oracleMsgText').textContent = `${dailyPoke.name} brings a unique message today. Look inward to find how this energy applies to your current path.`;
    document.getElementById('followUpSection').classList.add('visible');
  }, 200);
}

async function askFollowUp() {
    const userText = document.getElementById('userInput').value;
    if (!userText) return;
    document.getElementById('followUpResponse').textContent = "The spirits are whispering...";
    try {
        // Follow-up prompt tightened for pure mysticism.
        const followUpPrompt = `The user pulled ${currentDrawnPokeNames} and is asking: "${userText}". Speak as a direct, whimsical oracle. Provide 2 sentences of atmospheric guidance. No game mechanics or story descriptions.`;
        const response = await puter.ai.chat(followUpPrompt);
        document.getElementById('followUpResponse').textContent = response.toString();
    } catch (err) {
        document.getElementById('followUpResponse').textContent = "The connection flickered. Ask again.";
    }
}

createStars();
