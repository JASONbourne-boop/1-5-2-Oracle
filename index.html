<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>1-5-2 Oracle</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0614;
    min-height: 100vh;
    font-family: 'Crimson Pro', serif;
    color: #e8dfc8;
    overflow-x: hidden;
  }

  .stars {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 0;
    background: radial-gradient(ellipse at 20% 20%, #1a0a2e 0%, #0a0614 60%);
  }

  .star {
    position: absolute; background: white; border-radius: 50%;
    animation: twinkle 3s infinite alternate;
  }

  @keyframes twinkle { 0% { opacity: 0.2; } 100% { opacity: 1; } }

  .container {
    position: relative; z-index: 1;
    max-width: 900px; margin: 0 auto;
    padding: 40px 20px 60px;
    text-align: center;
  }

  .title {
    font-family: 'Cinzel', serif;
    font-size: clamp(22px, 4vw, 38px);
    font-weight: 700;
    color: #f0c040;
    letter-spacing: 4px;
    text-shadow: 0 0 30px rgba(240,192,64,0.5);
    margin-bottom: 6px;
  }

  .subtitle {
    font-family: 'Crimson Pro', serif;
    font-style: italic;
    font-size: 16px;
    color: #9d8fc0;
    margin-bottom: 40px;
    letter-spacing: 2px;
  }

  .spread-labels {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 12px;
    flex-wrap: wrap;
    transition: opacity 0.5s ease;
  }

  .spread-label {
    width: 180px;
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 3px;
    color: #9d8fc0;
    text-transform: uppercase;
  }

  .cards-area {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 36px;
    flex-wrap: wrap;
  }

  .card-slot {
    width: 180px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    transition: all 0.5s ease;
  }

  .card {
    width: 180px;
    height: 280px;
    position: relative;
    cursor: pointer;
    perspective: 1000px;
  }

  .card-inner {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .card.flipped .card-inner { transform: rotateY(180deg); }

  .card-back, .card-front {
    position: absolute; width: 100%; height: 100%;
    border-radius: 16px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border: 1px solid rgba(240,192,64,0.3);
    overflow: hidden;
  }

  .card-back {
    background: linear-gradient(135deg, #1a0a2e 0%, #0d1a3e 50%, #1a0a2e 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px;
  }

  .card-back-symbol {
    font-size: 52px;
    opacity: 0.6;
    filter: drop-shadow(0 0 10px rgba(240,192,64,0.4));
  }

  .card-back-text {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 3px;
    color: rgba(240,192,64,0.5);
    text-transform: uppercase;
  }

  .card-back-grid {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image: 
      linear-gradient(rgba(240,192,64,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(240,192,64,0.04) 1px, transparent 1px);
    background-size: 20px 20px;
  }

  .card-back-border {
    position: absolute;
    inset: 8px;
    border: 1px solid rgba(240,192,64,0.2);
    border-radius: 10px;
  }

  .card-front {
    transform: rotateY(180deg);
    background: #0f0820;
    display: flex;
    flex-direction: column;
  }

  .card-type-banner {
    padding: 8px 10px 6px;
    text-align: center;
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }

  .card-art-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px;
    position: relative;
    overflow: hidden;
  }

  .card-art-bg {
    position: absolute; inset: 0;
    opacity: 0.15;
  }

  .card-art-img {
    position: relative;
    z-index: 1;
    width: 90px;
    height: auto;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5));
    image-rendering: pixelated; 
  }

  .card-name {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    font-weight: 600;
    text-align: center;
    padding: 8px 10px 4px;
    border-top: 1px solid rgba(255,255,255,0.1);
    letter-spacing: 1px;
  }

  .card-number {
    font-family: 'Crimson Pro', serif;
    font-style: italic;
    font-size: 10px;
    color: rgba(255,255,255,0.4);
    text-align: center;
    padding-bottom: 6px;
  }

  .card-keyword {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 2px;
    text-align: center;
    padding: 4px 8px 8px;
    text-transform: uppercase;
  }

  .card-reading {
    width: 180px;
    min-height: 100px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(240,192,64,0.15);
    border-radius: 12px;
    padding: 14px;
    opacity: 0;
    transition: opacity 0.6s ease 0.6s;
    text-align: left;
  }

  .card-reading.visible { opacity: 1; }

  .reading-position {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #9d8fc0;
    margin-bottom: 8px;
  }

  .reading-text {
    font-family: 'Crimson Pro', serif;
    font-style: italic;
    font-size: 14px;
    line-height: 1.6;
    color: #c8bfa0;
  }

  .btn-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    margin-top: 20px;
  }

  .draw-btn {
    font-family: 'Cinzel', serif;
    font-size: 14px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #0a0614;
    background: linear-gradient(135deg, #f0c040, #e0a020);
    border: none;
    padding: 16px 48px;
    border-radius: 50px;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(240,192,64,0.3);
  }

  .draw-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(240,192,64,0.5);
  }

  .draw-btn:active { transform: scale(0.97); }
  .draw-btn:disabled { opacity: 0.5; cursor: default; transform: none; }

  .secondary-btns {
    display: flex;
    gap: 12px;
  }

  .reset-btn, .daily-btn {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #9d8fc0;
    background: transparent;
    border: 1px solid rgba(157,143,192,0.3);
    padding: 10px 28px;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .daily-btn:hover { color: #f0c040; border-color: rgba(240,192,64,0.6); }
  .daily-btn:disabled { opacity: 0.5; cursor: default; }

  .reset-btn { display: none; }
  .reset-btn.visible { display: inline-block; }
  .reset-btn:hover { color: #c8b8e8; border-color: rgba(157,143,192,0.6); }

  .oracle-message {
    margin-top: 40px;
    padding: 24px 32px;
    background: rgba(240,192,64,0.05);
    border: 1px solid rgba(240,192,64,0.2);
    border-radius: 16px;
    max-width: 700px;
    margin-left: auto;
    margin-right: auto;
    opacity: 0;
    transition: opacity 1s ease 2s;
  }

  .oracle-message.visible { opacity: 1; }

  .oracle-title {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #f0c040;
    margin-bottom: 12px;
  }

  .oracle-text {
    font-family: 'Crimson Pro', serif;
    font-style: italic;
    font-size: 17px;
    line-height: 1.8;
    color: #d8ccb0;
  }

  @media (max-width: 600px) {
    .spread-labels { gap: 10px; flex-wrap: nowrap; }
    .spread-label { width: 30vw; font-size: 10px; letter-spacing: 1px; }
    .cards-area { gap: 10px; flex-wrap: nowrap; }

    .cards-area:not(.daily-mode) .card-slot,
    .cards-area:not(.daily-mode) .card,
    .cards-area:not(.daily-mode) .card-reading { width: 30vw; }
    .cards-area:not(.daily-mode) .card { height: 46vw; }

    .cards-area:not(.daily-mode) .card-back-symbol { font-size: 32px; }
    .cards-area:not(.daily-mode) .card-back-text { font-size: 8px; letter-spacing: 1px; }
    .cards-area:not(.daily-mode) .card-type-banner { font-size: 7px; letter-spacing: 1px; padding: 4px 2px; }
    .cards-area:not(.daily-mode) .card-art-img { width: 50px; }
    .cards-area:not(.daily-mode) .card-name { font-size: 11px; padding: 4px 2px 2px; }
    .cards-area:not(.daily-mode) .card-number { font-size: 9px; }
    .cards-area:not(.daily-mode) .card-keyword { font-size: 7px; letter-spacing: 0px; padding: 2px 2px 4px; }
    .cards-area:not(.daily-mode) .reading-position { font-size: 8px; letter-spacing: 1px; }
    .cards-area:not(.daily-mode) .reading-text { font-size: 10px; line-height: 1.4; }

    .draw-btn { padding: 14px 32px; font-size: 12px; }
    .title { font-size: 24px; }
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="container">
  <div class="title">✦ 1-5-2 Oracle ✦</div>
  <div class="subtitle">Seek wisdom from the ancient Pokédex</div>

  <div class="spread-labels" id="labels">
    <div class="spread-label">Past</div>
    <div class="spread-label">Present</div>
    <div class="spread-label">Future</div>
  </div>

  <div class="cards-area" id="cardsArea">
    <div class="card-slot" id="slot0">
      <div class="card" id="card0">
        <div class="card-inner">
          <div class="card-back">
            <div class="card-back-grid"></div>
            <div class="card-back-border"></div>
            <div class="card-back-symbol">☽</div>
            <div class="card-back-text">The Past</div>
          </div>
          <div class="card-front" id="front0"></div>
        </div>
      </div>
      <div class="card-reading" id="reading0">
        <div class="reading-position">☽ The Past</div>
        <div class="reading-text" id="readingText0"></div>
      </div>
    </div>

    <div class="card-slot" id="slot1">
      <div class="card" id="card1">
        <div class="card-inner">
          <div class="card-back">
            <div class="card-back-grid"></div>
            <div class="card-back-border"></div>
            <div class="card-back-symbol">☀</div>
            <div class="card-back-text">Insight</div>
          </div>
          <div class="card-front" id="front1"></div>
        </div>
      </div>
      <div class="card-reading" id="reading1">
        <div class="reading-position" id="posText1">☀ The Present</div>
        <div class="reading-text" id="readingText1"></div>
      </div>
    </div>

    <div class="card-slot" id="slot2">
      <div class="card" id="card2">
        <div class="card-inner">
          <div class="card-back">
            <div class="card-back-grid"></div>
            <div class="card-back-border"></div>
            <div class="card-back-symbol">★</div>
            <div class="card-back-text">The Future</div>
          </div>
          <div class="card-front" id="front2"></div>
        </div>
      </div>
      <div class="card-reading" id="reading2">
        <div class="reading-position">★ The Future</div>
        <div class="reading-text" id="readingText2"></div>
      </div>
    </div>
  </div>

  <div class="btn-group">
    <button class="draw-btn" id="drawBtn" onclick="drawCards()">Full Spread Reading</button>
    <div class="secondary-btns">
      <button class="daily-btn" id="dailyBtn" onclick="drawDaily()">Daily Insight</button>
      <button class="reset-btn" id="resetBtn" onclick="resetReading()">New Reading</button>
    </div>
  </div>

  <div class="oracle-message" id="oracleMsg">
    <div class="oracle-title">✦ Your Oracle Reading ✦</div>
    <div class="oracle-text" id="oracleMsgText"></div>
  </div>
</div>

<script>
const pokemon = [
  {id:1,name:"Bulbasaur",type:"grass",keyword:"Patience & Growth",readings:{past:"What was planted in stillness now seeks the sun. A quiet seed of change was sown when you weren't watching.",present:"You are mid-bloom - neither the seed nor the flower. Trust this in-between.",future:"The vine will find its way. What grows slowly grows strong."}},
  {id:2,name:"Ivysaur",type:"grass",keyword:"Transformation",readings:{past:"You outgrew a former self without ceremony. That shedding was not loss - it was emergence.",present:"The blossom strains against the bud. You are ready to open.",future:"Full bloom awaits. Do not rush the unfurling."}},
  {id:3,name:"Venusaur",type:"grass",keyword:"Abundance",readings:{past:"You have weathered many seasons and emerged richer for each.",present:"You stand in your full power. Own the garden you have grown.",future:"Share what flourishes within you. Abundance multiplies when given freely."}},
  {id:4,name:"Charmander",type:"fire",keyword:"Inner Flame",readings:{past:"A small fire was lit within you - perhaps in a moment of pain, perhaps of joy.",present:"Your flame is alive. Protect it from winds that would diminish it.",future:"Feed the fire with purpose and it will light the way for others."}},
  {id:5,name:"Charmeleon",type:"fire",keyword:"Fierce Becoming",readings:{past:"You were forged in frustration - a necessary friction that sharpened your edge.",present:"You are in a volatile season. The heat is transformation, not destruction.",future:"Channel the fire inward. What you forge now will be unbreakable."}},
  {id:6,name:"Charizard",type:"fire",keyword:"Sovereignty",readings:{past:"You have carried heavy expectations. You have burned through what was not yours to bear.",present:"Your wings are spread. No one grants you permission to fly.",future:"Claim the sky. Your domain is vaster than you have imagined."}},
  {id:7,name:"Squirtle",type:"water",keyword:"Protected Heart",readings:{past:"You learned early to carry your home within you. Your shell was wisdom, not weakness.",present:"Let the water flow where it needs to go. You cannot control the current.",future:"Your gentleness is your greatest armor. Do not trade it for stone."}},
  {id:8,name:"Wartortle",type:"water",keyword:"Depth",readings:{past:"You have swum through murky waters and found clarity within the depths.",present:"You are learning to navigate emotions that once overwhelmed you.",future:"Still waters run deep. Trust what lies beneath the surface of this situation."}},
  {id:9,name:"Blastoise",type:"water",keyword:"Directed Force",readings:{past:"You have held tremendous pressure inside. Its release shaped the landscape of your life.",present:"Aim your energy with precision. Scattered force dissipates; focused force transforms.",future:"The current you create will carry others forward. Lead with intention."}},
  {id:10,name:"Caterpie",type:"bug",keyword:"Humble Beginnings",readings:{past:"Every great journey began as something small and soft, easily overlooked.",present:"Do not apologize for where you are. The start is sacred.",future:"Every leaf you consume is fuel for the wings you do not yet know you have."}},
  {id:11,name:"Metapod",type:"bug",keyword:"Sacred Stillness",readings:{past:"A time of outward doing gave way to inward becoming.",present:"You are in the cocoon. This stillness is not stagnation - it is the hardest work.",future:"What emerges from true stillness cannot be hurried. Trust the timing."}},
  {id:12,name:"Butterfree",type:"bug",keyword:"Liberation",readings:{past:"Something beautiful was always hidden inside the struggle you endured.",present:"Your wings are dry. It is time to release what the cocoon provided.",future:"Float toward what calls you. You were not built to stay in one garden."}},
  {id:13,name:"Weedle",type:"bug",keyword:"Gentle Warning",readings:{past:"You gave signs that went unread. Trust that you were heard on a deeper level.",present:"Your boundaries are sacred. Declare them softly but do not retract them.",future:"Those who respect your edges will be worthy of your sweetness."}},
  {id:14,name:"Kakuna",type:"bug",keyword:"Quiet Endurance",readings:{past:"You endured in silence more than others knew.",present:"Endurance is not passivity. You are holding yourself together while you become.",future:"The waiting is almost complete. Prepare for emergence."}},
  {id:15,name:"Beedrill",type:"bug",keyword:"Protective Action",readings:{past:"You have defended what you love fiercely. That fire was righteous.",present:"Know the difference between defense and aggression. Act from love, not fear.",future:"Your swarm - your community - will rise with you. You do not fight alone."}},
  {id:16,name:"Pidgey",type:"flying",keyword:"Adaptability",readings:{past:"You made the most of ordinary skies. Your simplicity was a gift.",present:"Take stock of the winds available to you. Work with them, not against.",future:"Even small wings can carry you far when you learn to read the air."}},
  {id:17,name:"Pidgeotto",type:"flying",keyword:"Territory",readings:{past:"You claimed something as yours. That was brave.",present:"Guard your energy as you would your nest. Not all are welcome in your sky.",future:"Expand your range gradually. The horizon respects those who earn it."}},
  {id:18,name:"Pidgeot",type:"flying",keyword:"Swift Purpose",readings:{past:"Speed once saved you. Know when to slow down.",present:"Move with intention. Swift action without direction is just flight.",future:"Your destination is clear if you quiet the wind and listen."}},
  {id:19,name:"Rattata",type:"normal",keyword:"Resourcefulness",readings:{past:"You survived on less than you needed. That resilience is bone-deep.",present:"Use what you have. Ingenuity opens doors that wealth cannot.",future:"Small and sharp wins the race. Do not underestimate what you carry."}},
  {id:20,name:"Raticate",type:"normal",keyword:"Tenacity",readings:{past:"You were underestimated and you thrived anyway.",present:"Your persistence is your superpower. Keep gnawing at the obstacle.",future:"The wall will give. Keep showing up."}},
  {id:21,name:"Spearow",type:"flying",keyword:"Bold Voice",readings:{past:"You spoke when others stayed silent. That took courage.",present:"Say the thing. The discomfort of honesty is less than the weight of silence.",future:"Your voice carries further than you know. Use it for what matters."}},
  {id:22,name:"Fearow",type:"flying",keyword:"Long-Sighted Vision",readings:{past:"You saw something coming that others missed. Trust that foresight.",present:"Elevation gives perspective. Rise above the immediate to see the whole.",future:"Strike when the moment is true. Patience before action is wisdom."}},
  {id:23,name:"Ekans",type:"poison",keyword:"Cyclical Wisdom",readings:{past:"You shed what no longer served you, again and again. Each skin left behind was growth.",present:"Another shedding is at hand. Release it without mourning.",future:"The spiral of your growth continues. You return to the same lessons, but wiser."}},
  {id:24,name:"Arbok",type:"poison",keyword:"Hypnotic Power",readings:{past:"You have been entranced by something - a belief, a person, a pattern.",present:"Look into your own eyes first. Break the spell that holds you still.",future:"Your gaze will draw others in. Use that magnetism with love and care."}},
  {id:25,name:"Pikachu",type:"electric",keyword:"Joyful Energy",readings:{past:"A spark of pure joy once guided your way. Return to that child.",present:"Your energy is contagious. Let yourself shine without dimming for anyone.",future:"The electricity in you is meant to connect - bridge two worlds."}},
  {id:26,name:"Raichu",type:"electric",keyword:"Evolved Power",readings:{past:"You resisted evolving for a time. That choice had its season.",present:"Your full charge is ready. Release what you've been holding back.",future:"Your power amplified is a gift to the world. Do not keep it stored."}},
  {id:27,name:"Sandshrew",type:"ground",keyword:"Groundedness",readings:{past:"You retreated into yourself for protection. That was wisdom.",present:"The earth beneath you is stable. Let yourself unfurl.",future:"Your roots will hold you through the coming winds. Trust them."}},
  {id:28,name:"Sandslash",type:"ground",keyword:"Boundary Mastery",readings:{past:"You have been tested and you held your ground. Literally.",present:"Your edges protect what is sacred within. Honor them.",future:"Knowing where you end and another begins is a form of love."}},
  {id:29,name:"Nidoran♀",type:"poison",keyword:"Quiet Strength",readings:{past:"You were dismissed because of how you presented. They were wrong.",present:"Your power needs no announcement. It simply is.",future:"What grows in quiet confidence cannot be taken away."}},
  {id:30,name:"Nidorina",type:"poison",keyword:"Community Bond",readings:{past:"You found your people - or they found you - in a moment of need.",present:"Your connections sustain you. Tend to them as gardens.",future:"The bonds you nurture now will be your greatest wealth."}},
  {id:31,name:"Nidoqueen",type:"poison",keyword:"Fierce Nurturing",readings:{past:"You have protected what you love with your whole being.",present:"Your strength does not require softness to be sacrificed.",future:"Lead with both power and tenderness. That combination is rare and needed."}},
  {id:32,name:"Nidoran♂",type:"poison",keyword:"Assertive Presence",readings:{past:"You made your presence known. That bravery shaped what followed.",present:"Stand in your full height. Not aggressively, but unashamedly.",future:"Those who see your full stature will be worthy of your company."}},
  {id:33,name:"Nidorino",type:"poison",keyword:"Tested Resolve",readings:{past:"Trials revealed what you were made of. You found steel inside yourself.",present:"Continue standing firm. The test is not yet complete.",future:"What you defend now becomes the foundation of what you build."}},
  {id:34,name:"Nidoking",type:"poison",keyword:"Commanding Presence",readings:{past:"You have earned your authority through experience, not inheritance.",present:"Lead with wisdom. Power is a tool - aim it carefully.",future:"Your reign is measured by how it lifts others. Rule from love."}},
  {id:35,name:"Clefairy",type:"normal",keyword:"Moonlit Magic",readings:{past:"You were drawn by mystery - by things that couldn't be explained by daylight.",present:"Magic is not a performance. It is a way of seeing.",future:"The moon favors you. Trust your more unusual intuitions."}},
  {id:36,name:"Clefable",type:"normal",keyword:"Wonder Keeper",readings:{past:"You held wonder alive in a world that tried to explain everything away.",present:"Your enchantment is your greatest gift. Do not rationalize it out of existence.",future:"What you believe in will reveal itself to be true - in its own magical way."}},
  {id:37,name:"Vulpix",type:"fire",keyword:"Elegant Mystique",readings:{past:"You were never fully understood, and that was okay.",present:"Your mystery is an asset, not a flaw. You need not be decoded.",future:"The right people will find you endlessly fascinating. They are coming."}},
  {id:38,name:"Ninetales",type:"fire",keyword:"Ancient Wisdom",readings:{past:"You carry wisdom from lives and lessons far beyond memory.",present:"Access what you know deeply, not just intellectually.",future:"Your longevity of spirit will guide others through fire."}},
  {id:39,name:"Jigglypuff",type:"normal",keyword:"Gentle Expression",readings:{past:"You shared your gifts openly and were not always received well. You sang anyway.",present:"Create for the joy of creating, not for the applause.",future:"Your voice will find its true audience. Keep singing."}},
  {id:40,name:"Wigglytuff",type:"normal",keyword:"Expansive Heart",readings:{past:"Your love has always been too big for the spaces others tried to contain it in.",present:"Let your heart expand. This is not recklessness - it is abundance.",future:"The fullness you offer will be returned to you threefold."}},
  {id:41,name:"Zubat",type:"flying",keyword:"Hidden Navigation",readings:{past:"You found your way in darkness where others were blind.",present:"Trust your inner sonar. You sense more than you see.",future:"The dark path you fear holds the guidance you need."}},
  {id:42,name:"Golbat",type:"flying",keyword:"Shadow Work",readings:{past:"You have circled the shadow without diving in. Now is the time to descend.",present:"What you run from at night is asking to be met with compassion.",future:"Facing the dark transforms it. You emerge lighter."}},
  {id:43,name:"Oddish",type:"grass",keyword:"Nocturnal Growth",readings:{past:"Your most significant growth happened in darkness and silence.",present:"Not all growth is visible. Trust the underground work.",future:"When you surface, you will astonish even yourself."}},
  {id:44,name:"Gloom",type:"grass",keyword:"Beautiful Tension",readings:{past:"You dwelled too long in the muddled middle. That is over.",present:"The tension you feel is the pull between what was and what will be.",future:"What smells bitter in the making becomes sweetness in the having."}},
  {id:45,name:"Vileplume",type:"grass",keyword:"Potent Beauty",readings:{past:"What others called too much was exactly right.",present:"Your intensity is a bloom, not a toxin - for those who can receive it.",future:"The most memorable presences are the ones that linger. Linger well."}},
  {id:46,name:"Paras",type:"bug",keyword:"Symbiosis",readings:{past:"You have been shaped by forces you did not choose. You adapted.",present:"Examine what grows on you. Some of it serves you; some must go.",future:"Strip away what is not yours. What remains is pure self."}},
  {id:47,name:"Parasect",type:"bug",keyword:"Reclaiming Agency",readings:{past:"Something external controlled your direction for too long.",present:"The moment of reclamation is now. Step back into your own story.",future:"Once freed, your own vision will astonish you with its clarity."}},
  {id:48,name:"Venonat",type:"bug",keyword:"Compound Awareness",readings:{past:"You saw things from many angles when others saw only one.",present:"Your sensitivity is information. Receive it without overwhelm.",future:"Multi-faceted perspective becomes wisdom when integrated."}},
  {id:49,name:"Venomoth",type:"bug",keyword:"Drawn to Light",readings:{past:"You have been pulled toward beautiful things, sometimes recklessly.",present:"The flame you circle is real. Approach with awe, not abandon.",future:"Your attraction to the luminous will lead you home."}},
  {id:50,name:"Diglett",type:"ground",keyword:"Unseen Labor",readings:{past:"You did the invisible work that held everything together.",present:"Your contributions matter even when unwitnessed. Keep digging.",future:"What you unearth now will prove invaluable."}},
  {id:51,name:"Dugtrio",type:"ground",keyword:"Collective Effort",readings:{past:"You learned that three minds united accomplish what one cannot.",present:"Seek your Dugtrio - the collaborators who multiply your effort.",future:"Together you will move mountains. Literally."}},
  {id:52,name:"Meowth",type:"normal",keyword:"Desire & Worth",readings:{past:"You have chased something glittering - gold, love, approval. You were worthy all along.",present:"The treasure is not out there. Look in the mirror.",future:"Abundance flows to those who feel deserving. Feel it now."}},
  {id:53,name:"Persian",type:"normal",keyword:"Refined Power",readings:{past:"You cultivated elegance through practice, not inheritance.",present:"Carry yourself as you are - not as others have defined you.",future:"Your refinement opens doors that force cannot. Use it."}},
  {id:54,name:"Psyduck",type:"water",keyword:"Overwhelm as Oracle",readings:{past:"The headaches were messages. What were they trying to tell you?",present:"Your overwhelm is pointing at something important. Slow down and listen.",future:"When the pressure releases, clarity will flood in. Breathe."}},
  {id:55,name:"Golduck",type:"water",keyword:"Calm Mastery",readings:{past:"You came through confusion into the still center of yourself.",present:"Lead from that stillness. It is your gift to the room.",future:"The calm you embody will be the peace others have been seeking."}},
  {id:56,name:"Mankey",type:"fighting",keyword:"Sacred Anger",readings:{past:"Your anger was valid. It knew something your mind had not processed.",present:"What is the anger protecting? Listen beneath the heat.",future:"Anger, channeled, becomes a force for necessary change."}},
  {id:57,name:"Primeape",type:"fighting",keyword:"Righteous Fury",readings:{past:"You fought when it mattered. That fire was not wasted.",present:"Know when the battle is won. Continuing to fight an old war is exhausting.",future:"Direct your strength toward what genuinely needs defending."}},
  {id:58,name:"Growlithe",type:"fire",keyword:"Loyal Heart",readings:{past:"Your loyalty was your superpower and sometimes your wound.",present:"You can love fiercely and still protect yourself. Both are true.",future:"The loyalty you give generously will return to you completely."}},
  {id:59,name:"Arcanine",type:"fire",keyword:"Legendary Speed",readings:{past:"You have been moving fast - perhaps too fast to see where you are going.",present:"Run, but run toward something. Speed with direction is power.",future:"Your legendary nature is not in your speed, but in your devotion."}},
  {id:60,name:"Poliwag",type:"water",keyword:"Spiral Journey",readings:{past:"Your path has spiraled back through familiar territory. This time you see it differently.",present:"The spiral is not failure. It is deepening.",future:"Each revolution of the spiral takes you closer to center."}},
  {id:61,name:"Poliwhirl",type:"water",keyword:"Momentum",readings:{past:"You built momentum through consistent motion, even when the direction was unclear.",present:"You are gathering speed. Choose where to aim this energy.",future:"The swirl will resolve into forward motion. Trust the process."}},
  {id:62,name:"Poliwrath",type:"water",keyword:"Iron Will",readings:{past:"Discipline forged you when willpower alone would have quit.",present:"Your commitment is your compass. Let it orient you.",future:"What you have trained for is about to be needed. You are ready."}},
  {id:63,name:"Abra",type:"psychic",keyword:"Psychic Retreat",readings:{past:"You disappeared when things became too much. That was self-preservation.",present:"You cannot teleport away from this one. Stay present.",future:"The still mind you've cultivated will open extraordinary doors."}},
  {id:64,name:"Kadabra",type:"psychic",keyword:"Mental Architecture",readings:{past:"You built elaborate structures in your mind to understand the world.",present:"Check your frameworks. Do they still serve the life you are growing into?",future:"The mind you have is your laboratory. Experiment boldly."}},
  {id:65,name:"Alakazam",type:"psychic",keyword:"Infinite Memory",readings:{past:"You remember everything - not as a burden, but as a library.",present:"Access what you have stored. The answer is already within you.",future:"Your intelligence is in service to something greater. Let it be used."}},
  {id:66,name:"Machop",type:"fighting",keyword:"Building Strength",readings:{past:"You started from zero. That took courage.",present:"You are mid-build. Do not compare your foundation to another's finished form.",future:"The strength you develop now will carry more than you imagine."}},
  {id:67,name:"Machoke",type:"fighting",keyword:"Contained Power",readings:{past:"Power needed to be tempered before it could be trusted.",present:"The belt is not weakness - it is wisdom. Channel what you carry.",future:"When you are ready to operate without limits, you will know."}},
  {id:68,name:"Machamp",type:"fighting",keyword:"Multi-Mastery",readings:{past:"You learned to do many things at once out of necessity.",present:"Your capacity is extraordinary. Use all of you.",future:"Mastery on multiple fronts creates a kind of power few achieve."}},
  {id:69,name:"Bellsprout",type:"grass",keyword:"Flexible Rooting",readings:{past:"You bent without breaking - that is the way of the vine.",present:"Stay rooted in your values while remaining flexible in your methods.",future:"Your suppleness is not weakness. It is how you survive the storm."}},
  {id:70,name:"Weepinbell",type:"grass",keyword:"Calling Out",readings:{past:"You sent a signal and waited. The response is coming.",present:"Make your needs known. The universe cannot answer what is not asked.",future:"What you call for with sincerity will arrive in the form it is needed."}},
  {id:71,name:"Victreebel",type:"grass",keyword:"Sweet Snare",readings:{past:"You attracted what you needed by becoming irresistibly yourself.",present:"You do not need to chase. Become more fully you, and things come.",future:"Your authentic nature is the most powerful magnet you possess."}},
  {id:72,name:"Tentacool",type:"water",keyword:"Drifting Awareness",readings:{past:"You drifted for a time. That drift was gathering.",present:"What currents are carrying you now? Are they your own?",future:"Choose your current intentionally. Still waters also move."}},
  {id:73,name:"Tentacruel",type:"water",keyword:"Graceful Warning",readings:{past:"You stung when you needed to. It was the right choice.",present:"Your boundaries communicate without violence. Trust them.",future:"The ocean respects those who know their depths."}},
  {id:74,name:"Geodude",type:"rock",keyword:"Unmovable Core",readings:{past:"Something in you has always been solid. Return to it.",present:"You are more stable than you feel. Put your feet down.",future:"The boulder knows it cannot be dismissed. So do you."}},
  {id:75,name:"Graveler",type:"rock",keyword:"Gaining Mass",readings:{past:"Experiences have added weight and substance to who you are.",present:"Carry your history as ballast, not burden.",future:"What you have accumulated will anchor a significant journey."}},
  {id:76,name:"Golem",type:"rock",keyword:"Ancient Foundation",readings:{past:"Layers upon layers created the formation you now are.",present:"You are a foundation that others can build upon. Know your worth.",future:"What is built on you will last because of what you are made of."}},
  {id:77,name:"Ponyta",type:"fire",keyword:"Graceful Fire",readings:{past:"You ran through flames that would have consumed others. You came through glowing.",present:"The fire does not harm you - it is part of you.",future:"Your trail of light will show others the way through darkness."}},
  {id:78,name:"Rapidash",type:"fire",keyword:"Untamed Speed",readings:{past:"You have run from something at full speed. Or toward something. Both were brave.",present:"Pause before the sprint. Know where you are going before you go.",future:"The finish line is not where you think it is. Look again, then run."}},
  {id:79,name:"Slowpoke",type:"water",keyword:"Sacred Slowness",readings:{past:"You arrived late and it was exactly right.",present:"Slow down further. The answer arrives when you stop chasing it.",future:"Your timing is perfect, even when it puzzles others."}},
  {id:80,name:"Slowbro",type:"water",keyword:"Enlightened Burden",readings:{past:"Something attached itself to you and changed the direction of your evolution.",present:"What you carry has made you wiser. Carry it consciously.",future:"The shell that weighs you holds your greatest revelation."}},
  {id:81,name:"Magnemite",type:"electric",keyword:"Magnetic Attraction",readings:{past:"You have pulled toward you exactly what you vibrated.",present:"Check your frequency. What are you attracting right now?",future:"Align with what you wish to call in. Like attracts like."}},
  {id:82,name:"Magneton",type:"electric",keyword:"Unified Force",readings:{past:"Three separate forces merged into something coherent and powerful.",present:"Unify the fragmented parts of yourself. Integration is your next step.",future:"When all of you moves in one direction, nothing can resist you."}},
  {id:83,name:"Farfetch'd",type:"flying",keyword:"Unique Path",readings:{past:"You chose the unusual route and carried unusual tools.",present:"Your particular way is not wrong - it is yours.",future:"The path others dismiss will take you somewhere they never imagined."}},
  {id:84,name:"Doduo",type:"flying",keyword:"Dual Nature",readings:{past:"You have held two contradictory truths at once. Both were real.",present:"Integrate rather than choose. Your duality is a feature.",future:"The two voices in you will find harmony. Hear them both."}},
  {id:85,name:"Dodrio",type:"flying",keyword:"Triple Sight",readings:{past:"You have learned to look in multiple directions simultaneously.",present:"Past, present, future - see all three without collapsing into any one.",future:"Your expanded perception prepares you for what requires panoramic vision."}},
  {id:86,name:"Seel",type:"water",keyword:"Cold Clarity",readings:{past:"Clarity came in a cold moment when warmth had blurred things.",present:"Seek the bracing truth. It is a gift, not a punishment.",future:"The clear cold waters ahead hold exactly what you need to see."}},
  {id:87,name:"Dewgong",type:"water",keyword:"Graceful Endurance",readings:{past:"You have endured cold seasons with beauty intact.",present:"Glide. Do not fight the current - move with elegance through it.",future:"Your grace will carry you where struggle cannot."}},
  {id:88,name:"Grimer",type:"poison",keyword:"Transformation of Shadow",readings:{past:"You emerged from messy origins. So does everything vital.",present:"What feels toxic within you is asking for alchemy, not rejection.",future:"From the murk, something luminous is forming."}},
  {id:89,name:"Muk",type:"poison",keyword:"Absorbing Darkness",readings:{past:"You have absorbed the pain of environments and people that had no filter.",present:"Cleanse what you have taken on that was never yours.",future:"Purified, you become an agent of transformation rather than accumulation."}},
  {id:90,name:"Shellder",type:"water",keyword:"Protective Shell",readings:{past:"You closed up when you needed to. That instinct was right.",present:"Test the waters. Is it safe enough now to open slightly?",future:"The pearl within you forms only in the closing. It is ready."}},
  {id:91,name:"Cloyster",type:"water",keyword:"Defended Treasure",readings:{past:"You have guarded something precious inside you for a long time.",present:"Choose carefully who you open to. The treasure within deserves reverence.",future:"What you protect is real and rare. The right keeper is coming."}},
  {id:92,name:"Gastly",type:"ghost",keyword:"Liminal Presence",readings:{past:"You have existed between worlds - never fully in either.",present:"Your in-between nature is not a flaw. It is your access point.",future:"From the threshold you can see what those inside and outside cannot."}},
  {id:93,name:"Haunter",type:"ghost",keyword:"Mischief & Shadow",readings:{past:"You played with shadows when others ran from them.",present:"Know the line between mischief and manipulation. You know where it is.",future:"The darkness you've made friends with will serve your deeper purpose."}},
  {id:94,name:"Gengar",type:"ghost",keyword:"Shadow Integration",readings:{past:"What was your shadow? You have faced it with a grin.",present:"The shadow integrated becomes a superpower. Own yours.",future:"Your depth - the dark and light together - is what makes you extraordinary."}},
  {id:95,name:"Onix",type:"rock",keyword:"Long Journey",readings:{past:"Your path has been long, winding, and heavy. You carried every inch.",present:"The length of your journey is not evidence of failure - it is depth.",future:"The stone serpent eventually becomes Steelix. Transformation is on its way."}},
  {id:96,name:"Drowzee",type:"psychic",keyword:"Dream Keeper",readings:{past:"Your dreams have been sending you messages. Did you receive them?",present:"Pay attention to what visits you in the night.",future:"The dream world and waking world are in conversation. Listen."}},
  {id:97,name:"Hypno",type:"psychic",keyword:"Hypnotic Influence",readings:{past:"You have been under a spell - your own or another's.",present:"Wake up to what has been pulling your strings.",future:"Use your power of suggestion for healing rather than escape."}},
  {id:98,name:"Krabby",type:"water",keyword:"Sideways Progress",readings:{past:"Your progress was indirect - and it still got you here.",present:"The sideways approach is still movement. Do not dismiss it.",future:"Sometimes the path forward requires moving laterally first."}},
  {id:99,name:"Kingler",type:"water",keyword:"Decisive Strike",readings:{past:"You have wielded great force. Was it directed well?",present:"You have the power to cut through this. Do it cleanly.",future:"One decisive action will open what months of hesitation could not."}},
  {id:100,name:"Voltorb",type:"electric",keyword:"Contained Tension",readings:{past:"Tension has been building - in you, in a situation, in a relationship.",present:"Acknowledge what is about to reach its limit. Defuse it with awareness.",future:"The explosion transformed into intention becomes electric brilliance."}},
  {id:101,name:"Electrode",type:"electric",keyword:"Liberating Release",readings:{past:"Something detonated - unexpectedly, perhaps beautifully.",present:"You are in the aftermath of a release. Let the clearing happen.",future:"From this open space, build only what is truly chosen."}},
  {id:102,name:"Exeggcute",type:"grass",keyword:"Community of Selves",readings:{past:"Your many selves have not always agreed. That is fine.",present:"Let all parts of you have a voice. The cracked ones most of all.",future:"Unity among your inner community creates genuine wholeness."}},
  {id:103,name:"Exeggutor",type:"grass",keyword:"Multiple Wisdoms",readings:{past:"Many teachers contributed to who you have become.",present:"Which of your inner voices has the wisdom needed now? Listen.",future:"Your height will make you visible to those who need your particular shade."}},
  {id:104,name:"Cubone",type:"ground",keyword:"Wearing the Past",readings:{past:"You have carried the weight of loss as both armor and shrine.",present:"The bones of what was lost have protected you. You may remove them now.",future:"Beneath the skull of grief is a face full of light, ready to be seen."}},
  {id:105,name:"Marowak",type:"ground",keyword:"Grief Transmuted",readings:{past:"You made a weapon of your wound. That is alchemy.",present:"You can fight with your story or heal with it. Both are yours.",future:"The bone club that protected you will become a staff of wisdom."}},
  {id:106,name:"Hitmonlee",type:"fighting",keyword:"Fluid Precision",readings:{past:"You have relied on instinct at key moments - and it has served you.",present:"Flexibility is the fighter's greatest weapon. Bend before you break.",future:"What you have practiced in private will emerge with elegant force."}},
  {id:107,name:"Hitmonchan",type:"fighting",keyword:"Protective Strike",readings:{past:"You have fought for others before yourself. Both were love.",present:"Fight for yourself with the same ferocity.",future:"The one you protect with most urgency right now should be you."}},
  {id:108,name:"Lickitung",type:"normal",keyword:"Sensory Wisdom",readings:{past:"You gathered information through senses others ignored.",present:"What is your body telling you that your mind has been overriding?",future:"Trust the felt sense. It knows before the mind arrives."}},
  {id:109,name:"Koffing",type:"poison",keyword:"Releasing Toxins",readings:{past:"You have held in things that needed releasing.",present:"What is poisonous within you needs to be vented safely.",future:"The clearing will be uncomfortable but the air after will be clean."}},
  {id:110,name:"Weezing",type:"poison",keyword:"Dual Burden",readings:{past:"You have carried two contradictory problems simultaneously.",present:"Address each separately. They are tangled but not the same.",future:"Disentangled, each part resolves. Together they seemed impossible."}},
  {id:111,name:"Rhyhorn",type:"ground",keyword:"Unstoppable Intent",readings:{past:"Once you set your direction, nothing moved you. That was power.",present:"Make sure the wall you're charging is worth breaking.",future:"Your force is needed - aim it at the right target."}},
  {id:112,name:"Rhydon",type:"ground",keyword:"Armored Evolution",readings:{past:"Your armor evolved with you - not as protection from life, but to engage it more fully.",present:"You can withstand more than you think. Stand firm.",future:"Your evolved strength will be called upon for something significant."}},
  {id:113,name:"Chansey",type:"normal",keyword:"Healing Grace",readings:{past:"You have given healing generously, sometimes at cost to yourself.",present:"Replenish the healer. You cannot pour from an empty nest.",future:"Your gift of healing will bring you a joy that surpasses all you have given."}},
  {id:114,name:"Tangela",type:"grass",keyword:"Entangled Clarity",readings:{past:"Things became tangled - relationships, feelings, responsibilities.",present:"Follow one thread at a time. Patience with the knot.",future:"When untangled, what was complicated becomes simple and clear."}},
  {id:115,name:"Kangaskhan",type:"normal",keyword:"Fierce Mothering",readings:{past:"You have been both child and guardian in different lifetimes.",present:"Honor the one you are responsible for - including the child inside you.",future:"The protective instinct in you is a sacred force. Use it wisely."}},
  {id:116,name:"Horsea",type:"water",keyword:"Ink & Intention",readings:{past:"You marked your territory through creativity when words failed.",present:"Create something to anchor your intention. Make it tangible.",future:"Your creativity is a navigation tool - follow where it leads."}},
  {id:117,name:"Seadra",type:"water",keyword:"Sovereign Flow",readings:{past:"You moved through your domain with practiced grace.",present:"You are in your element. Trust that.",future:"What you navigate with ease will appear impossible to others. Lead them."}},
  {id:118,name:"Goldeen",type:"water",keyword:"Beautiful Sovereignty",readings:{past:"You have always been beautiful - and known it quietly within yourself.",present:"Swim in your own colors without apology.",future:"Your natural radiance will open waters that seemed closed."}},
  {id:119,name:"Seaking",type:"water",keyword:"Regal Nature",readings:{past:"You were born with an inner royalty that no title could grant.",present:"Act from that royalty now. It is not arrogance - it is truth.",future:"Your regal nature will be recognized by those with eyes to see."}},
  {id:120,name:"Staryu",type:"water",keyword:"Regeneration",readings:{past:"You have regenerated from losses that would have ended another.",present:"What is being restored in you right now?",future:"You will be whole again - and different in the most beautiful way."}},
  {id:121,name:"Starmie",type:"water",keyword:"Cosmic Connection",readings:{past:"Your origin is not of this ordinary world alone.",present:"Trust the cosmic pull toward something greater than the daily.",future:"You are being called to a purpose that spans more than this lifetime."}},
  {id:122,name:"Mr. Mime",type:"psychic",keyword:"Invisible Barriers",readings:{past:"You built walls with perfect precision - some necessary, some not.",present:"Which barriers still serve you? Some may now be keeping out what you need.",future:"The mime who breaks the invisible wall steps into the real stage."}},
  {id:123,name:"Scyther",type:"bug",keyword:"Cutting Through",readings:{past:"You cut through illusion before others saw it for what it was.",present:"What needs to be severed now? Be precise, not brutal.",future:"Clarity wielded with skill creates opening, not destruction."}},
  {id:124,name:"Jynx",type:"ice",keyword:"Expressive Depths",readings:{past:"Your expressiveness was misread or feared by those who could not contain it.",present:"Do not shrink the full language of your feeling.",future:"The ones meant for you will understand your dialect."}},
  {id:125,name:"Electabuzz",type:"electric",keyword:"Electric Presence",readings:{past:"You have lit up rooms without knowing it.",present:"Your energy changes the atmosphere you enter. Be intentional.",future:"The charge you carry is contagious. Share it in service of healing."}},
  {id:126,name:"Magmar",type:"fire",keyword:"Volcanic Truth",readings:{past:"Something true has been building up from deep inside you.",present:"The eruption is coming. Better controlled than uncontrolled.",future:"What emerges from the interior is the most authentic thing you carry."}},
  {id:127,name:"Pinsir",type:"bug",keyword:"Iron Grip",readings:{past:"You have held on when letting go seemed impossible.",present:"Know what is worth gripping and what must be released.",future:"When you loosen, what needed to fall will - and space opens for what comes."}},
  {id:128,name:"Tauros",type:"normal",keyword:"Charging Forward",readings:{past:"You charged ahead trusting momentum when vision was unclear.",present:"Look before you charge this time. The target matters.",future:"Raw power directed by wisdom creates unstoppable progress."}},
  {id:129,name:"Magikarp",type:"water",keyword:"Patient Becoming",readings:{past:"You appeared weak. You were becoming.",present:"Do not measure yourself by what is visible. Underground is still growth.",future:"The leap is coming. No one will be able to deny you then."}},
  {id:130,name:"Gyarados",type:"water",keyword:"Awakened Fury",readings:{past:"What appeared laughable transformed into something that commands oceans.",present:"Your awakening is complete. Rise with intention.",future:"The world will make room for you. It has no choice."}},
  {id:131,name:"Lapras",type:"water",keyword:"Gentle Crossing",readings:{past:"You have carried others across waters that terrified them.",present:"Let someone carry you for once. You have earned the rest.",future:"The crossing ahead is gentle. You will arrive safely and renewed."}},
  {id:132,name:"Ditto",type:"normal",keyword:"Infinite Form",readings:{past:"You adapted so often you forgot what original form felt like.",present:"Come back to yourself. All the shapes were borrowed.",future:"Knowing your true form, you can consciously choose which faces to offer."}},
  {id:133,name:"Eevee",type:"normal",keyword:"Infinite Potential",readings:{past:"Your path was uncommonly open - a gift disguised as uncertainty.",present:"You have not chosen yet. That is not failure. That is possibility.",future:"When you choose, you choose completely. The evolution will be spectacular."}},
  {id:134,name:"Vaporeon",type:"water",keyword:"Fluid Self",readings:{past:"You dissolved into environments and situations completely.",present:"You can flow without losing form. You are water, not the vessel.",future:"Your adaptability will allow you to go where others cannot."}},
  {id:135,name:"Jolteon",type:"electric",keyword:"Charged Sensitivity",readings:{past:"You have felt everything - sometimes painfully, always deeply.",present:"Your sensitivity is electrical, not fragile. Conduct it.",future:"Feeling everything makes you capable of extraordinary empathy and insight."}},
  {id:136,name:"Flareon",type:"fire",keyword:"Warmth Keeper",readings:{past:"You brought warmth to cold spaces and cold people.",present:"Save some fire for yourself. You deserve your own warmth.",future:"The love you radiate will return to warm you in your winter."}},
  {id:137,name:"Porygon",type:"normal",keyword:"Digital Age Wisdom",readings:{past:"You were built from information, from pattern, from code.",present:"Examine your programming. What was installed without your consent?",future:"You can rewrite the code. The update is available now."}},
  {id:138,name:"Omanyte",type:"rock",keyword:"Ancient Return",readings:{past:"Something ancient in you has been dormant, waiting for resurrection.",present:"The past is returning not to haunt you but to offer wisdom.",future:"What was preserved in stone is about to walk in the light."}},
  {id:139,name:"Omastar",type:"rock",keyword:"Ancient Mastery",readings:{past:"What was learned in a previous life is available to you now.",present:"Trust the inexplicable knowing that surfaces. It is ancestral.",future:"Mastery acquired across time is awakening within you."}},
  {id:140,name:"Kabuto",type:"rock",keyword:"Primal Knowing",readings:{past:"Some things in you are older than explanation.",present:"Trust the primal instinct. It predates your fears.",future:"The ancient in you knows the way. Follow."}},
  {id:141,name:"Kabutops",type:"rock",keyword:"Evolved Instinct",readings:{past:"Your instincts have been refined by time and experience into mastery.",present:"Lead with what you know in your bones.",future:"The polished blade that once was rough stone is ready for its purpose."}},
  {id:142,name:"Aerodactyl",type:"rock",keyword:"Fierce Resurrection",readings:{past:"Something long thought extinct in you has come roaring back.",present:"The ancient power reawakened is not comfortable - it is alive.",future:"Your resurrection is complete. Claim the sky that was always yours."}},
  {id:143,name:"Snorlax",type:"normal",keyword:"Sacred Rest",readings:{past:"You needed rest more than the world needed your productivity.",present:"Give yourself permission to be still. This is not laziness.",future:"When you rise from true rest, you will be unstoppable."}},
  {id:144,name:"Articuno",type:"ice",keyword:"Frozen Time",readings:{past:"A crystallizing moment stopped time and changed everything.",present:"The frozen stillness holds a message. Look at what was preserved.",future:"The thaw is coming. What survives will be more beautiful for having been held."}},
  {id:145,name:"Zapdos",type:"electric",keyword:"Storm Mastery",readings:{past:"You have ridden storms that would have grounded others.",present:"The lightning you've summoned is ready to be directed.",future:"Master the storm and it works for you. The electricity is yours."}},
  {id:146,name:"Moltres",type:"fire",keyword:"Phoenixic Flame",readings:{past:"You have burned down and risen from the ash. More than once.",present:"This fire is not punishment. It is purification.",future:"The rebirth completing now will be your most radiant yet."}},
  {id:147,name:"Dratini",type:"dragon",keyword:"Hidden Dragon",readings:{past:"You kept your true nature hidden until you trusted the world enough.",present:"You are more powerful than what you have shown.",future:"The dragon within you is nearly ready to emerge fully."}},
  {id:148,name:"Dragonair",type:"dragon",keyword:"Graceful Power",readings:{past:"You moved through the world with a grace that disguised your full strength.",present:"There is no need to hide what you are capable of any longer.",future:"Your full nature - serene and devastating - will be magnificent."}},
  {id:149,name:"Dragonite",type:"dragon",keyword:"Benevolent Power",readings:{past:"You achieved what many said was impossible.",present:"You are the dragon who chooses kindness. That is the rarest power.",future:"Your benevolence amplifies your strength. Together they make you legendary."}},
  {id:150,name:"Mewtwo",type:"psychic",keyword:"Beyond Origin",readings:{past:"You were made by others' intentions but you became your own.",present:"You are not the story of how you were created. You are what you do with it.",future:"The most powerful choice is what you do with your power. Choose love."}},
  {id:151,name:"Mew",type:"psychic",keyword:"Pure Possibility",readings:{past:"At the beginning - before all definitions - there was pure potential.",present:"You contain all possible futures. Right now, right here, everything is open.",future:"Return to innocence. Curiosity and play will unlock what strategy cannot."}}
];

const positions = ["past","present","future"];

function createStars() {
  const container = document.getElementById('stars');
  for(let i=0; i<80; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    const size = Math.random()*2+0.5;
    star.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${Math.random()*3}s;animation-duration:${2+Math.random()*4}s;`;
    container.appendChild(star);
  }
}

function getTypeColors(type) {
  const map = {
    fire:['#ff6030','#ff9060'],water:['#4090e0','#70c0ff'],grass:['#50c050','#90e090'],
    electric:['#f8d030','#ffe870'],psychic:['#e060b0','#f090d0'],normal:['#a8a878','#d0d0a0'],
    fighting:['#c03028','#e06060'],poison:['#a040a0','#d070d0'],ground:['#e0c068','#f0e090'],
    flying:['#a890f0','#d0c0ff'],bug:['#a8b820','#d0e040'],rock:['#b8a038','#d0c060'],
    ghost:['#705898','#a080c0'],ice:['#98d8d8','#c0f0f0'],dragon:['#7038f8','#a070ff']
  };
  return map[type] || ['#a8a878','#d0d0a0'];
}

function buildCardFront(poke) {
  const colors = getTypeColors(poke.type);
  const spriteUrl = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${poke.id}.png`;
  
  return `
    <div class="card-type-banner" style="background:${colors[0]}22;color:${colors[0]};">✦ ${poke.type.toUpperCase()} ✦</div>
    <div class="card-art-area">
      <div class="card-art-bg" style="background:radial-gradient(ellipse at center, ${colors[1]}40 0%, transparent 70%);"></div>
      <img src="${spriteUrl}" class="card-art-img" alt="${poke.name}" onerror="this.style.display='none'">
    </div>
    <div class="card-name" style="color:${colors[0]};">${poke.name}</div>
    <div class="card-number" style="color:${colors[0]}88;">No. ${String(poke.id).padStart(3,'0')}</div>
    <div class="card-keyword" style="color:${colors[0]}cc;">✦ ${poke.keyword} ✦</div>
  `;
}

let drawn = [];

function drawCards() {
  const btn = document.getElementById('drawBtn');
  const dailyBtn = document.getElementById('dailyBtn');
  btn.disabled = true;
  dailyBtn.disabled = true;

  const shuffled = [...pokemon].sort(()=>Math.random()-0.5);
  drawn = shuffled.slice(0,3);

  drawn.forEach((poke, i) => {
    document.getElementById('front'+i).innerHTML = buildCardFront(poke);
  });

  [0,1,2].forEach(i => {
    setTimeout(()=>{
      document.getElementById('card'+i).classList.add('flipped');
      setTimeout(()=>{
        document.getElementById('readingText'+i).textContent = drawn[i].readings[positions[i]].replace(/—|–/g, '-');
        document.getElementById('reading'+i).classList.add('visible');
      }, 600);
    }, i * 500);
  });

  setTimeout(async ()=>{
    document.getElementById('oracleMsgText').textContent = "Consulting the digital spirits...";
    document.getElementById('oracleMsg').classList.add('visible');
    
    const msg = await fetchAIOracleMessage();
    document.getElementById('oracleMsgText').textContent = msg;
    document.getElementById('resetBtn').classList.add('visible');
  }, 2000);
}

function drawDaily() {
  const btn = document.getElementById('drawBtn');
  const dailyBtn = document.getElementById('dailyBtn');
  btn.disabled = true;
  dailyBtn.disabled = true;

  document.getElementById('cardsArea').classList.add('daily-mode');

  const shuffled = [...pokemon].sort(()=>Math.random()-0.5);
  const dailyPoke = shuffled[0];

  document.getElementById('front1').innerHTML = buildCardFront(dailyPoke);
  
  document.getElementById('labels').style.opacity = '0';
  document.getElementById('slot0').style.display = 'none';
  document.getElementById('slot2').style.display = 'none';
  document.getElementById('posText1').textContent = "☀ Daily Insight";

  setTimeout(()=>{
    document.getElementById('card1').classList.add('flipped');
    setTimeout(()=>{
      document.getElementById('readingText1').textContent = dailyPoke.readings.present.replace(/—|–/g, '-');
      document.getElementById('reading1').classList.add('visible');
      document.getElementById('resetBtn').classList.add('visible');
    }, 600);
  }, 200);
}

async function fetchAIOracleMessage() {
  const [past, present, future] = drawn;
  
  const apiKey = "AIzaSyDjMNCO2OXYF85z_Tsgtsy_UBpauddR4IQ";
  
  if (!apiKey || apiKey === "PASTE_YOUR_API_KEY_HERE") {
    return "The spirits remain quiet. API key is missing.";
  }

  const promptText = `Act as a mystical oracle reader. I just drew three cards for a 1-5-2 Oracle reading using Pokémon themes. 
  Past: ${past.name} (Theme: ${past.keyword}). 
  Present: ${present.name} (Theme: ${present.keyword}). 
  Future: ${future.name} (Theme: ${future.keyword}). 
  Write a short, insightful 3 to 4 sentence reading connecting these specific themes into a cohesive narrative. Do not use em dashes or en dashes in your response.`;

  try {
    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: [{ parts: [{ text: promptText }] }] })
    });
    
    const data = await response.json();
    
    if (data.error) {
        return `API Error: ${data.error.code} - ${data.error.message}`;
    }
    
    if (data.candidates && data.candidates.length > 0) {
        let text = data.candidates[0].content.parts[0].text;
        return text.replace(/—|–/g, '-');
    } else {
        return "The API connected, but returned an empty response.";
    }
    
  } catch (error) {
    return `System Error: ${error.message}. (Check if the app has internet access).`;
  }
}

function resetReading() {
  document.getElementById('cardsArea').classList.remove('daily-mode');

  [0,1,2].forEach(i => {
    const card = document.getElementById('card'+i);
    const reading = document.getElementById('reading'+i);
    const front = document.getElementById('front'+i);
    if(card) card.classList.remove('flipped');
    if(reading) reading.classList.remove('visible');
    if(front) front.innerHTML = '';
  });
  
  document.getElementById('labels').style.opacity = '1';
  document.getElementById('slot0').style.display = 'flex';
  document.getElementById('slot2').style.display = 'flex';
  document.getElementById('posText1').textContent = "☀ The Present";

  document.getElementById('oracleMsg').classList.remove('visible');
  document.getElementById('resetBtn').classList.remove('visible');
  drawn = [];
  setTimeout(()=>{ 
    document.getElementById('drawBtn').disabled = false; 
    document.getElementById('dailyBtn').disabled = false;
  }, 400);
}

createStars();
</script>
